<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#818cf8"/>
      <stop offset="50%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a5b4fc"/>
      <stop offset="100%" style="stop-color:#818cf8"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="#0f1629" stroke="url(#g1)" stroke-width="2"/>

  <!-- Scale pillar -->
  <rect x="248" y="140" width="16" height="200" rx="8" fill="url(#g1)"/>

  <!-- Base -->
  <rect x="196" y="330" width="120" height="12" rx="6" fill="url(#g1)"/>
  <rect x="220" y="340" width="72" height="8" rx="4" fill="url(#g2)" opacity="0.5"/>

  <!-- Balance beam -->
  <rect x="128" y="152" width="256" height="8" rx="4" fill="url(#g1)"/>

  <!-- Fulcrum triangle -->
  <polygon points="256,128 244,152 268,152" fill="url(#g2)"/>

  <!-- Left scale pan -->
  <line x1="160" y1="156" x2="160" y2="220" stroke="url(#g2)" stroke-width="3"/>
  <path d="M 120 220 Q 140 244 160 244 Q 180 244 200 220" stroke="url(#g1)" stroke-width="3" fill="rgba(99,102,241,0.1)"/>
  <!-- Left pan chains -->
  <line x1="140" y1="156" x2="128" y2="220" stroke="url(#g2)" stroke-width="2" opacity="0.6"/>
  <line x1="180" y1="156" x2="192" y2="220" stroke="url(#g2)" stroke-width="2" opacity="0.6"/>

  <!-- Right scale pan -->
  <line x1="352" y1="156" x2="352" y2="220" stroke="url(#g2)" stroke-width="3"/>
  <path d="M 312 220 Q 332 244 352 244 Q 372 244 392 220" stroke="url(#g1)" stroke-width="3" fill="rgba(99,102,241,0.1)"/>
  <!-- Right pan chains -->
  <line x1="332" y1="156" x2="320" y2="220" stroke="url(#g2)" stroke-width="2" opacity="0.6"/>
  <line x1="372" y1="156" x2="384" y2="220" stroke="url(#g2)" stroke-width="2" opacity="0.6"/>

  <!-- Circuit/Digital elements -->
  <!-- Left circuit nodes -->
  <circle cx="148" cy="280" r="4" fill="#818cf8" filter="url(#glow)"/>
  <circle cx="128" cy="300" r="3" fill="#6366f1" opacity="0.7"/>
  <circle cx="168" cy="296" r="3" fill="#6366f1" opacity="0.7"/>
  <line x1="148" y1="284" x2="128" y2="297" stroke="#6366f1" stroke-width="1.5" opacity="0.4"/>
  <line x1="148" y1="284" x2="168" y2="293" stroke="#6366f1" stroke-width="1.5" opacity="0.4"/>

  <!-- Right circuit nodes -->
  <circle cx="364" cy="280" r="4" fill="#818cf8" filter="url(#glow)"/>
  <circle cx="344" cy="300" r="3" fill="#6366f1" opacity="0.7"/>
  <circle cx="384" cy="296" r="3" fill="#6366f1" opacity="0.7"/>
  <line x1="364" y1="284" x2="344" y2="297" stroke="#6366f1" stroke-width="1.5" opacity="0.4"/>
  <line x1="364" y1="284" x2="384" y2="293" stroke="#6366f1" stroke-width="1.5" opacity="0.4"/>

  <!-- Center circuit - AI brain -->
  <circle cx="256" cy="390" r="5" fill="#818cf8" filter="url(#glow)"/>
  <circle cx="236" cy="400" r="3" fill="#6366f1" opacity="0.6"/>
  <circle cx="276" cy="400" r="3" fill="#6366f1" opacity="0.6"/>
  <circle cx="256" cy="412" r="3" fill="#6366f1" opacity="0.5"/>
  <line x1="256" y1="395" x2="236" y2="397" stroke="#6366f1" stroke-width="1" opacity="0.4"/>
  <line x1="256" y1="395" x2="276" y2="397" stroke="#6366f1" stroke-width="1" opacity="0.4"/>
  <line x1="256" y1="395" x2="256" y2="409" stroke="#6366f1" stroke-width="1" opacity="0.4"/>

  <!-- Subtle orbital rings -->
  <ellipse cx="256" cy="256" rx="200" ry="30" stroke="#6366f1" stroke-width="0.5" opacity="0.1" transform="rotate(-20 256 256)"/>
  <ellipse cx="256" cy="256" rx="180" ry="25" stroke="#818cf8" stroke-width="0.5" opacity="0.08" transform="rotate(15 256 256)"/>
</svg>
